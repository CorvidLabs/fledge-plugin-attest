name: CI

on:
  push:
    branches: [main]
    paths:
      - Sources/**
      - Tests/**
      - Package.swift
      - Package.resolved
      - plugin.toml
      - fledge.toml
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - Sources/**
      - Tests/**
      - Package.swift
      - Package.resolved
      - plugin.toml
      - fledge.toml
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # PUBLIC repo: GitHub-hosted runner only (never self-hosted).
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test
